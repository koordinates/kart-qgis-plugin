name: Linting

on: [push, pull_request]

jobs:
  ruff-lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin to the same ruff version used by the pre-commit hook so CI and
      # local developer runs can't disagree.
      - name: ruff check
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.12.7"
          args: "check"
      - name: ruff format
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.12.7"
          args: "format --check"
