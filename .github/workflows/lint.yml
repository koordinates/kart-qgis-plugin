name: Linting

on: [push, pull_request]

jobs:
  ruff-lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # NOTE: keep these versions in sync with .pre-commmit-config.yaml
      - name: ruff check
        uses: astral-sh/ruff-action@v4.0.0
        with:
          version: "0.15.11"
          args: "check"
      - name: ruff format
        uses: astral-sh/ruff-action@v4.0.0
        with:
          version: "0.15.11"
          args: "format --check"
